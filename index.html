<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- === НАЧАЛО БЛОКА ДЛЯ ПОИСКОВЫХ РОБОТОВ GOOGLE И ЯНДЕКСА === -->
    <title>Anima Robotics — Anthropomorphic Biorobotics</title>
    <meta name="description" content="Anima Robotics Official Website. Next-generation anthropomorphic AI companion robots with deep empathy, lifelike skin, and absolute data privacy. Local server architecture. Premiere in 2027.">
    <meta name="robots" content="index, follow">
    <meta name="google-site-verification" content="hrqpFtP0JL8XAdfWON6MvFkojFO3lrMgQsC99DZMVCI" />
    <!-- === КОНЕЦ БЛОКА ДЛЯ ПОИСКОВЫХ РОБОТОВ === -->

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #030305;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 50px 20px;
            overflow-x: hidden;
            position: relative;
        }
        /* Исправленный эффект мягкого глубокого свечения на фоне */
        body::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 700px;
            height: 700px;
            background: radial-gradient(circle, rgba(0, 102, 204, 0.05) 0%, rgba(0,0,0,0) 70%);
            z-index: 1;
            pointer-events: none;
        }
        header {
            text-align: center;
            z-index: 2;
        }
        .logo {
            font-size: 2.3rem;
            font-weight: 200;
            letter-spacing: 0.35em;
            text-transform: uppercase;
            background: linear-gradient(180deg, #ffffff 0%, #8e8e93 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }
        main {
            max-width: 800px;
            text-align: center;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: auto 0;
        }
        /* Оптимизированный блок под вертикальный прямоугольный формат арта */
        .concept-art {
            width: auto;
            max-width: 100%;
            height: 52vh; /* Картинка займет чуть больше половины экрана, идеально для вертикального силуэта */
            margin-bottom: 35px;
            border-radius: 8px;
            box-shadow: 0 0 50px rgba(0, 102, 204, 0.12); /* Мягкий бирюзово-синий ореол вокруг робота */
            display: block;
            margin-left: auto;
            margin-right: auto;
        }
        .tagline {
            font-size: 1.15rem;
            font-weight: 300;
            line-height: 1.7;
            color: #d2d2d7;
            max-width: 550px;
            margin-bottom: 25px;
            letter-spacing: 0.03em;
        }
        .features {
            font-size: 0.8rem;
            color: #0066cc;
            text-transform: uppercase;
            letter-spacing: 0.25em;
            margin-bottom: 35px;
            font-weight: 500;
        }
        .status-badge {
            display: inline-block;
            padding: 8px 18px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.07);
            border-radius: 20px;
            font-size: 0.75rem;
            letter-spacing: 0.08em;
            color: #8e8e93;
            text-transform: uppercase;
            margin-bottom: 30px;
        }
        .cta-email {
            font-size: 1rem;
            color: #8e8e93;
            text-decoration: none;
            border-bottom: 1px dashed rgba(255,255,255,0.15);
            padding-bottom: 4px;
            letter-spacing: 0.05em;
            transition: all 0.4s ease;
        }
        .cta-email:hover {
            color: #0066cc;
            border-color: #0066cc;
        }
        footer {
            text-align: center;
            font-size: 0.75rem;
            color: #2c2c2e; /* Более приглушенный цвет для сохранения фокуса на продукте */
            letter-spacing: 0.1em;
            text-transform: uppercase;
            z-index: 2;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">Anima Robotics</div>
    </header>

    <main>
        <!-- Арт с оптическими волокнами встанет сюда -->
        <img class="concept-art" src="robot.jpg" alt="Anima Robotics Structural Concept" onerror="this.style.display='none'">
        
        <p class="tagline">Next-generation anthropomorphic AI companion with deep empathy and tactile sensory systems.</p>
        
        <div class="features">Fully Local Server &bull; Zero Filters &bull; Absolute Privacy</div>
        
        <div class="status-badge">Official premiere at the exhibition in 2027</div>
        
        <a href="mailto:info@animarobotics.tech" class="cta-email">info@animarobotics.tech</a>
    </main>

    <footer>
        &copy; 2026 Anima Robotics. All rights reserved.
    </footer>

</body>
</html>
